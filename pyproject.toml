[build-system]
    requires = ["setuptools"]
    build-backend = "setuptools.build_meta"

[project]
    name = "zepben.evolve"
    version = "0.48.0b1"
    description = "Python SDK for interacting with the Evolve platform"
    readme = {file = "README.md", content-type = "test/markdown"}
    license = "MPL-2.0"
    requires-python = '>=3.9,<3.13'
    authors = [
        {name = "Kurt Greaves", email = "kurt.greaves@zepben.com"}
    ]
    dependencies = [
        "zepben.auth==0.12.1",
        "zepben.protobuf==0.37.0",
        "typing_extensions==4.12.2"
    ]
    classifiers = [
        "Programming Language :: Python :: 3",
        "Programming Language :: Python :: 3.9",
        "Programming Language :: Python :: 3.10",
        "Programming Language :: Python :: 3.11",
        "Operating System :: OS Independent"
    ]

[project.urls]
    Repository = "https://github.com/zepben/evolve-sdk-python"
    Homepage = "https://zepben.com"

[project.optional-dependencies]
    test = [
        "pytest==7.1.2",
        "pytest-cov==2.10.1",
        "pytest-asyncio==0.19.0",
        "pytest-timeout==1.4.2",
        "hypothesis==6.56.3",
        "grpcio-testing==1.61.3",
        "pylint==2.14.5",
        "six==1.16.0",
        "tox"
    ]

[tool.setuptools.packages.find]
where = ["src/"]