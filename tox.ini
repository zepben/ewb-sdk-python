[tox]
envlist =
    clean
    py{312, 311, 310, 39}
    build

[testenv]
# run our tests, and setup the dependecy tree
allowlist_externals = /bin/bash
    /usr/bin/bash
passenv = GITHUB_*
pip_pre = true
deps =
    .[test]
depends =
    # require clean to run before the tests
    py{312, 311, 310, 39}: clean

    # build the package after testing
    build: py{312, 311, 310, 39}
commands =
    pytest --cov=zepben.evolve --cov-append --cov-report=term-missing --cov-branch {posargs}

[testenv:clean]
# remove coverage data from the previous run
deps = coverage
skip_install = true
commands = coverage erase

[testenv:build]
# build the wheel
deps =
    .[build]
commands =
    python -m build .

[pytest]
pythonpath = ./src ./test
log_file_level = DEBUG
log_file = pytest.log
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s %(levelname)s %(message)s
asyncio_mode = auto
timeout = 15
