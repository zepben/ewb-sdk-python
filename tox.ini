[tox]
envlist =
    lint
    py{3.14, 3.13, 3.12, 3.11, 3.10}
    build

[testenv]
# run our tests, and setup the dependecy tree
passenv = GITHUB_*
pip_pre = true
extras = test
depends =
    # run lint before testing
    py{3.14, 3.13, 3.12, 3.11, 3.10}: lint
    # build the package after testing
    build: py{3.14, 3.13, 3.12, 3.11, 3.10}
commands = pytest --cov=zepben.ewb --cov-report=xml --cov-branch {posargs}

[testenv:lint]
basepython = py3.10
description = Run ruff linting checks
deps = ruff
skip_install = true
commands = ruff check .

[testenv:build]
basepython = py3.10
# build the wheel
commands = python -m pip install build
           python -m build

[pytest]
pythonpath = ./src ./test
log_file_level = DEBUG
log_file = pytest.log
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s %(levelname)s %(message)s
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
timeout = 15
