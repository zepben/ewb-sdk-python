[tox]
envlist =
    clean
    py{312, 311, 310, 39}
    report
    build

[testenv]
allowlist_externals = /bin/bash
    /usr/bin/bash
passenv = GITHUB_*
pip_pre = true
deps =
    .[build]
    .[test]

depends =
    py{312, 311, 310, 39}: clean
    report: py{312, 311, 310, 39}

commands =
    pytest --cov=zepben.evolve --cov-append --cov-report=term-missing --cov-branch {posargs}

[testenv:report]
deps = coverage
skip_install = true
commands =
    coverage report

[testenv:clean]
deps = coverage
skip_install = true
commands = coverage erase

[testenv:build]
deps =
    .[build]

commands =
    python -m build .

depends =
    report

[pytest]
pythonpath = ./src ./test
log_file_level = DEBUG
log_file = pytest.log
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s %(levelname)s %(message)s
asyncio_mode = auto
timeout = 15
